name: CI

# Quality gates for every PR (and main). These mirror the local gates the agents
# run before opening a PR — branch protection on `main` should require these checks.
# NOTE: this runs on GitHub's runners (GitHub-billed), NOT the Claude Max subscription.
# Only the *agent loop* must stay off the metered API path; CI test runs are fine here.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint · typecheck · voice-tests · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Voice regression tests (smoke)
        run: npx tsx voice-tests/runner.ts --smoke
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.looperapp.org

  backend:
    name: Backend (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync deps
        run: uv sync
      - name: Lint (ruff)
        run: uv run ruff check .
