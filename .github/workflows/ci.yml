name: CI

# Quality gates for every PR (and main). Runs on GitHub's runners (GitHub-billed),
# NOT the Claude Max subscription — only the *agent loop* must stay off the metered
# API path; CI test runs here are fine.
#
# RATCHET: all `required-*` jobs are green on main today — branch protection should
# require them. As of 2026-06-27 the former `advisory` checks were burned down and
# promoted to required: frontend ESLint is clean (0/0 — see backlog frontend-lint-cleanup,
# which also stopped ESLint from scanning the Capacitor ios/ bundle), and voice-tests
# --smoke passes 260/260. The 238 vitest unit tests (games engine + voice pipeline) are
# now run here too. Nothing is advisory anymore; add a check back as a new step only if it
# carries fresh, temporary debt.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  required-frontend:
    name: Frontend gates (lint · typecheck · voice-tests · unit · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Lint (ESLint)
        run: npm run lint
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Voice regression tests (smoke)
        run: npx tsx voice-tests/runner.ts --smoke
      - name: Unit tests (vitest)
        run: npm test
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.looperapp.org

  required-backend:
    name: Backend gate (ruff + pytest incl. route/integration)
    runs-on: ubuntu-latest
    # Postgres service backs the route/integration tests (tests/integration/).
    # The pure-logic tests (tests/*.py) need no DB. `uv run pytest` runs both;
    # with the DB present the integration tests execute (they only skip when no
    # Postgres is reachable). Promoted from advisory → required 2026-06-28 after
    # the integration harness passed for real against Postgres in CI on PR #51.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: scorecard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/scorecard_test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync deps
        run: uv sync
      - name: Lint (ruff)
        run: uv run ruff check .   # ruff is pinned in pyproject dev group
      - name: Unit + route/integration tests (pytest)
        run: uv run pytest         # pure-logic + tests/integration/ (Postgres service above)

  # ─── Advisory E2E gate (auth flow + core journeys) ──────────────────────────
  #
  # WHY ADVISORY: this job requires two Clerk credentials that are not yet
  # configured as CI secrets:
  #   CLERK_PUBLISHABLE_KEY  — public key; enables the AuthGate in the app.
  #   CLERK_SECRET_KEY       — private key; lets clerkSetup() fetch a testing
  #                            token so OTP 424242 bypasses bot detection.
  #
  # TO PROMOTE TO REQUIRED:
  #   1. Add the two secrets above to the repo's Settings → Secrets.
  #   2. Create (or confirm auto-creation of) the test user
  #      looper+clerk_test@looperapp.org in the Clerk dev-instance dashboard.
  #   3. Remove `continue-on-error: true` below and add this job to branch
  #      protection's required checks.
  #
  # WHAT RUNS WITHOUT SECRETS: when CLERK_SECRET_KEY is absent, all four tests
  # self-skip with a clear message. The job still exits 0 (continue-on-error).
  # When CLERK_PUBLISHABLE_KEY is also absent, Tier 1 (sign-in screen renders)
  # additionally skips; with it set only Tier 2 (full sign-in flow) skips.
  #
  # NOTE: this web E2E catches web/flow regressions but does NOT reproduce
  # Capacitor webview-origin (capacitor:// vs https://localhost) issues.
  # Those still need a simulator/manual smoke per TestFlight build.
  advisory-e2e:
    name: "E2E smoke advisory (auth gate + core journeys)"
    needs: [required-frontend]
    runs-on: ubuntu-latest
    continue-on-error: true   # advisory until Clerk CI secrets are configured
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Install Playwright browsers (Chromium only)
        run: npx playwright install --with-deps chromium
      - name: E2E smoke tests
        run: npm run test:e2e
        env:
          # These are set from CI secrets once configured.
          # Without them, tests self-skip and the job reports advisory-green.
          CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
